spring:
  application:
    name: be4fe-admin-aurora-performance

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:aurora-performance}
          jwk-set-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:aurora-performance}/protocol/openid-connect/certs
      client:
        registration:
          core-client:
            client-id: ${CORE_CLIENT_ID:aurora-bff-admin}
            client-secret: ${CORE_CLIENT_SECRET:aurora-bff-admin-secret}
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          core-client:
            token-uri: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:aurora-performance}/protocol/openid-connect/token

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}
  realm: ${KEYCLOAK_REALM:aurora-performance}
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

services:
  core-url: ${CORE_SERVICE_URL:http://localhost:8081}

server:
  port: ${SERVER_PORT:8083}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    com.be4fe_admin_aurora_performance: INFO
    org.springframework.security: WARN
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus,metrics,info"
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
